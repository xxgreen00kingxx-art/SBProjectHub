<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SB Project Hub</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:#1f2937;
color:white;
padding:40px;
}

section{
padding:40px;
}

.button{
display:inline-block;
padding:15px 25px;
margin:10px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
}

footer{
background:#111827;
color:white;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>SB Project Hub</h1>
<p>Plan. Finance. Build.</p>
</header>

<section>
<h2>Connect Homeowners with Trusted Contractors</h2>

<p>
Get estimates, financing options, and professional contractors
for your next project.
</p>

<a href="#" class="button">Request Estimate</a>
<a href="#" class="button">Join as Contractor</a>
<section>
<h2>Recent Projects</h2>

<img src="photo1.jpg" alt="Project photo" style="width:300px;border-radius:8px;margin:10px;">

</section>

<footer>
<p>© 2026 SB Project Hub</p>
</footer>
<section style="max-width:600px;margin:40px auto;padding:20px;border:1px solid #ccc;border-radius:8px;">
    <h2>Request a Free Estimate</h2>

    <form action="https://formspree.io/f/mqevezzz" method="post">
        <p>
            <label>Name</label><br>
            <input type="text" name="name" style="width:100%;">
        </p>

        <p>
            <label>Email</label><br>
            <input type="email" name="email" style="width:100%;">
        </p>

        <p>
            <label>Phone Number</label><br>
            <input type="tel" name="phone" style="width:100%;">
        </p>

        <p>
            <label>Project Type</label><br>
            <input type="text" name="project" style="width:100%;">
        </p>

        <p>
            <label>Project Description</label><br>
            <textarea name="description" rows="5" style="width:100%;"></textarea>
        </p>

        <button type="submit">Request Estimate</button>
    </form>
</section>
</body>
</html>
